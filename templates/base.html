<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}🏓 Ping Pong Manager{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            table: { DEFAULT: '#166534', light: '#16a34a', glow: '#22c55e' },
            ball:  { DEFAULT: '#ea580c', light: '#f97316' },
            gold:   '#fbbf24',
            silver: '#9ca3af',
            bronze: '#b45309',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f172a; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
    .btn-primary { background: #16a34a; color: #fff; padding: 8px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background .2s; }
    .btn-primary:hover { background: #15803d; }
    .btn-danger  { background: #dc2626; color: #fff; padding: 6px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background .2s; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-orange  { background: #ea580c; color: #fff; padding: 8px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background .2s; }
    .btn-orange:hover { background: #c2410c; }
    .input-field { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 8px; padding: 8px 12px; width: 100%; }
    .input-field:focus { outline: 2px solid #16a34a; }
    .badge-draft     { background: #1e3a5f; color: #60a5fa; }
    .badge-active    { background: #14532d; color: #4ade80; }
    .badge-completed { background: #3b1a1a; color: #f87171; }
    .ping-ball { display: inline-block; width: 10px; height: 10px; background: #f97316; border-radius: 50%; margin: 0 3px; }
    .nav-link { color: #94a3b8; padding: 8px 14px; border-radius: 8px; font-weight: 500; transition: all .2s; }
    .nav-link:hover, .nav-link.active { background: #1e3a2f; color: #4ade80; }
    .match-card { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 14px; }
    .match-card.completed { border-color: #14532d; }
    .score-badge { background: #1e293b; border-radius: 6px; padding: 2px 10px; font-weight: 700; font-size: 1.1rem; color: #e2e8f0; }
    .score-winner { color: #4ade80; font-weight: 800; }
    .medal-gold   { background: linear-gradient(135deg,#fbbf24,#d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .medal-silver { background: linear-gradient(135deg,#e2e8f0,#9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .medal-bronze { background: linear-gradient(135deg,#d97706,#92400e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    .spin-slow { animation: spin-slow 8s linear infinite; }
  </style>
</head>
<body class="min-h-screen text-slate-200">

  <!-- Navbar -->
  <nav class="border-b border-slate-700/50 backdrop-blur-sm sticky top-0 z-50" style="background:#0f172add">
    <div class="max-w-7xl mx-auto px-4 flex items-center gap-2 h-16">
      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 mr-4">
        <svg class="w-9 h-9" viewBox="0 0 40 40" fill="none">
          <!-- paddle -->
          <ellipse cx="16" cy="20" rx="13" ry="14" fill="#16a34a" stroke="#4ade80" stroke-width="1.5"/>
          <ellipse cx="16" cy="20" rx="8" ry="9" fill="#15803d"/>
          <line x1="29" y1="30" x2="38" y2="39" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
          <!-- ball -->
          <circle cx="33" cy="9" r="5" fill="#f97316" stroke="#fed7aa" stroke-width="1"/>
          <path d="M30 7 Q33 5 36 7" stroke="#fff8" stroke-width="0.8" fill="none"/>
        </svg>
        <span class="font-bold text-lg text-white hidden sm:block">PingPong<span class="text-green-400">Manager</span></span>
      </a>
      <div class="flex gap-1 flex-wrap">
        <a href="/" class="nav-link text-sm {% if request.url.path == '/' %}active{% endif %}">🏠 Inicio</a>
        <a href="/players" class="nav-link text-sm {% if '/players' in request.url.path %}active{% endif %}">👤 Jugadores</a>
        <a href="/teams" class="nav-link text-sm {% if '/teams' in request.url.path %}active{% endif %}">👥 Equipos</a>
        <a href="/tournaments" class="nav-link text-sm {% if '/tournaments' in request.url.path %}active{% endif %}">🏆 Torneos</a>
        <a href="/leagues" class="nav-link text-sm {% if '/leagues' in request.url.path %}active{% endif %}">🥇 Ligas</a>
      </div>
      <div class="ml-auto flex items-center gap-3">
        {% if request.state.is_admin %}
        <span class="hidden sm:inline text-xs px-2 py-1 rounded-full bg-green-900/40 border border-green-700 text-green-400 font-semibold">Admin</span>
        <form method="post" action="/logout">
          <button type="submit" class="text-sm text-slate-400 hover:text-red-400 transition font-medium">Salir</button>
        </form>
        {% else %}
        <a href="/login" class="text-sm text-slate-400 hover:text-green-400 transition font-medium">🔐 Admin</a>
        {% endif %}
        <span class="ping-ball spin-slow"></span>
        <span class="ping-ball spin-slow" style="animation-delay:.3s"></span>
        <span class="ping-ball spin-slow" style="animation-delay:.6s"></span>
      </div>
    </div>
  </nav>

  <!-- Flash message -->
  {% if msg %}
  <div class="max-w-7xl mx-auto px-4 pt-4">
    <div class="flex items-center gap-2 bg-green-900/40 border border-green-700 text-green-300 rounded-lg px-4 py-3 text-sm">
      <span>✅</span> {{ msg.replace('+', ' ') }}
    </div>
  </div>
  {% endif %}

  <!-- Content -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="text-center py-6 text-slate-600 text-xs border-t border-slate-800 mt-12">
    🏓 PingPong Manager — Torneos & Ligas
  </footer>

</body>
</html>
